<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procesos de Edición — Aliado UB SAS</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Epilogue:wght@400;600;700;900&family=Mulish:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--green:#16A34A;--green-bg:#F0FDF4;--green-bd:#BBF7D0;--purple:#7C3AED;--purple-bg:#F5F3FF;--purple-bd:#DDD6FE;--gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;--gray-400:#9CA3AF;--gray-600:#4B5563;--gray-900:#111827;--blue:#2563EB;--blue-bg:#EFF6FF;--amber:#D97706;--amber-bg:#FFFBEB;--surface:#FFFFFF;--border:#E5E7EB;--font-mono:'IBM Plex Mono',monospace;--font-head:'Epilogue',sans-serif;--font-body:'Mulish',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--gray-100);color:var(--gray-900);font-size:13px}
.header{background:var(--gray-900);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;gap:20px;position:sticky;top:0;z-index:50;border-bottom:1px solid #1F2937}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{font-size:20px}
.logo-text{font-family:var(--font-head);font-weight:900;font-size:15px;color:#fff;letter-spacing:-.3px}
.logo-sub{font-family:var(--font-mono);font-size:10px;color:var(--gray-400);margin-top:1px}
.header-right{display:flex;align-items:center;gap:10px}
.hpill{font-family:var(--font-mono);font-size:11px;padding:4px 10px;border-radius:20px;font-weight:500}
.hpill.g{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.hpill.p{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-bd)}
.hpill.b{background:#1F2937;color:var(--gray-400);border:1px solid #374151}
.sync-btn{font-family:var(--font-head);font-weight:700;font-size:11px;padding:5px 12px;background:#1F2937;color:var(--gray-400);border:1px solid #374151;border-radius:6px;cursor:pointer;transition:.15s}
.sync-btn:hover{background:#374151;color:#fff}
.sync-btn.syncing{color:#60A5FA;border-color:#60A5FA;animation:pulse 1s infinite}
.sync-btn.ok{color:var(--green);border-color:var(--green-bd)}
.sync-btn.err{color:#F87171;border-color:#F87171}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.tab-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex}
.tab{font-family:var(--font-head);font-weight:700;font-size:12px;letter-spacing:.3px;padding:0 18px;height:42px;display:flex;align-items:center;gap:6px;border:none;background:none;cursor:pointer;color:var(--gray-400);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab.active{color:var(--gray-900);border-bottom-color:var(--gray-900)}
.tab:hover:not(.active){color:var(--gray-600)}
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.search-box{position:relative}
.search-box input{font-family:var(--font-body);font-size:12px;padding:7px 10px 7px 30px;border:1px solid var(--border);border-radius:6px;outline:none;width:220px;background:var(--gray-50)}
.search-box input:focus{border-color:var(--gray-900);background:#fff}
.search-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--gray-400);pointer-events:none}
select.fsel{font-family:var(--font-body);font-size:12px;padding:7px 10px;border:1px solid var(--border);border-radius:6px;background:var(--gray-50);cursor:pointer;outline:none}
.pill-group{display:flex;gap:4px}
.pill{font-family:var(--font-head);font-weight:700;font-size:11px;letter-spacing:.3px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);cursor:pointer;background:var(--gray-50);color:var(--gray-600);transition:all .12s}
.pill.ag{background:var(--green);color:#fff;border-color:var(--green)}
.pill.ap{background:var(--purple);color:#fff;border-color:var(--purple)}
.pill.aa{background:var(--gray-900);color:#fff;border-color:var(--gray-900)}
.add-btn{margin-left:auto;font-family:var(--font-head);font-weight:700;font-size:12px;padding:7px 14px;background:var(--gray-900);color:#fff;border:none;border-radius:6px;cursor:pointer;transition:background .12s}
.add-btn:hover{background:#374151}
.divider{width:1px;height:20px;background:var(--border)}
.table-container{padding:16px 24px}
.table-wrap{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--surface);box-shadow:0 1px 3px rgba(0,0,0,.05)}
table{width:100%;border-collapse:collapse}
thead{background:var(--gray-50);border-bottom:2px solid var(--border)}
thead th{font-family:var(--font-head);font-weight:700;font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--gray-400);padding:10px 14px;text-align:left;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--gray-100);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--gray-50)}
tbody tr.sep td{font-family:var(--font-head);font-weight:900;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gray-400);padding:8px 14px;background:var(--gray-50);border-bottom:1px solid var(--border)}
td{padding:10px 14px;vertical-align:middle}
.toggle-btn{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-family:var(--font-head);font-weight:700;font-size:11px;letter-spacing:.3px;border:none;cursor:pointer;transition:all .18s;white-space:nowrap}
.toggle-btn.montado{background:var(--green-bg);color:var(--green);border:1.5px solid var(--green-bd)}
.toggle-btn.montado:hover{background:var(--green);color:#fff}
.toggle-btn.pendiente{background:var(--purple-bg);color:var(--purple);border:1.5px solid var(--purple-bd)}
.toggle-btn.pendiente:hover{background:var(--purple);color:#fff}
.toggle-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.toggle-btn.montado .toggle-dot{background:var(--green)}
.toggle-btn.pendiente .toggle-dot{background:var(--purple)}
.toggle-btn.montado:hover .toggle-dot,.toggle-btn.pendiente:hover .toggle-dot{background:#fff}
.store{display:inline-block;font-family:var(--font-mono);font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px}
.JUPPITAG{background:#EFF6FF;color:#1D4ED8}.BACHITAG{background:var(--green-bg);color:#15803D}
.MORRISTAG{background:var(--purple-bg);color:#6D28D9}.SAMBITAG{background:var(--amber-bg);color:var(--amber)}
.foto-link{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-family:var(--font-mono);color:var(--blue);text-decoration:none;padding:4px 9px;background:var(--blue-bg);border-radius:5px;border:1px solid #BFDBFE;transition:background .1s;max-width:150px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.foto-link:hover{background:#DBEAFE}
.foto-input-wrap{display:flex;align-items:center;gap:5px}
.foto-input{font-family:var(--font-mono);font-size:11px;padding:4px 8px;border:1px solid var(--border);border-radius:5px;width:130px;outline:none}
.foto-input:focus{border-color:var(--blue)}
.foto-save-btn{font-size:11px;padding:4px 8px;background:var(--blue);color:#fff;border:none;border-radius:5px;cursor:pointer;font-family:var(--font-head);font-weight:700}
.prod-name{font-weight:600;font-size:12.5px}
.prod-pagename{font-size:11px;color:var(--gray-600);margin-top:2px}
.prod-id{font-family:var(--font-mono);font-size:11px;color:var(--gray-400)}
.price{font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--green)}
.price-comp{font-family:var(--font-mono);font-size:10px;color:var(--gray-400);text-decoration:line-through}
.nota-tag{font-size:10px;background:var(--amber-bg);color:var(--amber);padding:2px 6px;border-radius:4px;font-weight:600;font-family:var(--font-head)}
.chip{font-family:var(--font-head);font-weight:700;font-size:10px;padding:2px 7px;border-radius:3px;display:inline-block}
.chip.ok{background:var(--green-bg);color:var(--green)}.chip.no{background:var(--gray-100);color:var(--gray-400)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:10px;padding:24px;width:90%;max-width:480px;box-shadow:0 25px 50px rgba(0,0,0,.15);max-height:90vh;overflow-y:auto}
.modal-title{font-family:var(--font-head);font-weight:900;font-size:16px;margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-family:var(--font-head);font-weight:700;font-size:10px;letter-spacing:.6px;text-transform:uppercase;color:var(--gray-400);margin-bottom:5px}
.form-group input,.form-group select{width:100%;font-family:var(--font-body);font-size:13px;padding:8px 11px;border:1px solid var(--border);border-radius:6px;outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--gray-900)}
.check-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.check-item{display:flex;align-items:center;gap:7px;font-size:12px;cursor:pointer;padding:7px 10px;border:1px solid var(--border);border-radius:6px}
.check-item input[type=checkbox]{width:auto}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.btn-sec{font-family:var(--font-head);font-weight:700;font-size:12px;padding:8px 16px;border:1px solid var(--border);border-radius:6px;background:var(--surface);cursor:pointer}
.btn-pri{font-family:var(--font-head);font-weight:700;font-size:12px;padding:8px 18px;background:var(--gray-900);color:#fff;border:none;border-radius:6px;cursor:pointer}
.empty{padding:60px;text-align:center;color:var(--gray-400);font-family:var(--font-head);font-weight:700}
.toast{position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:8px;font-family:var(--font-head);font-weight:700;font-size:12px;z-index:999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:#D1FAE5;color:#065F46;border:1px solid var(--green-bd)}
.toast.err{background:#FEE2E2;color:#991B1B;border:1px solid #FECACA}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <span class="logo-mark">🎋</span>
    <div>
      <div class="logo-text">Procesos de Edición</div>

    </div>
  </div>
  <div class="header-right">
    <span class="hpill g" id="hp-montado">● Montados: —</span>
    <span class="hpill p" id="hp-pend">● Pendientes: —</span>
    <span class="hpill b" id="hp-total">Total: —</span>
    <button class="sync-btn" id="sync-btn" onclick="syncAll()">☁ Guardar en Sheet</button>
  </div>
</header>

<div class="tab-bar">
  <button class="tab active" onclick="switchTab('paginas',this)">📄 Páginas de Productos</button>
  <button class="tab" onclick="switchTab('videos',this)">🎬 Procesos de Video</button>
</div>

<div class="toolbar" id="tb-paginas">
  <div class="search-box"><span class="search-ico">🔍</span><input id="sp" type="text" placeholder="Buscar producto, ID…" oninput="renderPaginas()"></div>
  <select class="fsel" id="fp-mes" onchange="renderPaginas()">
    <option value="">Todos los meses</option>
    <option>ENERO</option><option>FEBRERO</option><option>MARZO</option><option>ABRIL</option><option>MAYO</option>
  </select>
  <select class="fsel" id="fp-tienda" onchange="renderPaginas()">
    <option value="">Todas las tiendas</option>
    <option>JUPPITAG</option><option>BACHITAG</option><option>MORRISTAG</option><option>SAMBITAG</option>
  </select>
  <div class="divider"></div>
  <div class="pill-group" id="pg-p">
    <button class="pill aa" onclick="setEstP('todos',this)">Todos</button>
    <button class="pill" onclick="setEstP('montado',this)">● Montados</button>
    <button class="pill" onclick="setEstP('pendiente',this)">● Pendientes</button>
  </div>
  <button class="add-btn" onclick="openModal('pagina')">+ Agregar</button>
</div>

<div class="toolbar" id="tb-videos" style="display:none">
  <div class="search-box"><span class="search-ico">🔍</span><input id="sv" type="text" placeholder="Buscar producto…" oninput="renderVideos()"></div>
  <select class="fsel" id="fv-mes" onchange="renderVideos()">
    <option value="">Todos los meses</option>
    <option>ENERO</option><option>FEBRERO</option><option>MARZO</option><option>ABRIL</option><option>MAYO</option>
  </select>
  <div class="divider"></div>
  <div class="pill-group" id="pg-v">
    <button class="pill aa" onclick="setEstV('todos',this)">Todos</button>
    <button class="pill" onclick="setEstV('done',this)">● Completos</button>
    <button class="pill" onclick="setEstV('pend',this)">● Pendientes</button>
  </div>
  <button class="add-btn" onclick="openModal('video')">+ Agregar</button>
</div>

<div class="table-container" id="panel-paginas">
  <div class="table-wrap"><table>
    <thead><tr>
      <th style="width:130px">Estado</th><th>Fecha</th><th>Producto</th><th>ID</th>
      <th>Tienda</th><th>Nombre en Página</th><th style="width:170px">Foto del Producto</th><th>Precio</th><th>Notas</th>
    </tr></thead>
    <tbody id="tb-p"></tbody>
  </table></div>
</div>

<div class="table-container" id="panel-videos" style="display:none">
  <div class="table-wrap"><table>
    <thead><tr>
      <th style="width:130px">Estado</th><th>Fecha</th><th>Producto</th>
      <th>Material</th><th>Descarga</th><th>Voz Off</th><th>Edición</th><th>Creativos</th><th>Notas</th>
    </tr></thead>
    <tbody id="tb-v"></tbody>
  </table></div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn-sec" onclick="closeModal()">Cancelar</button>
      <button class="btn-pri" onclick="saveItem()">Guardar</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

function toast(msg, type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type+' show';
  setTimeout(()=>t.className='toast', 3000);
}

function setSyncBtn(state, text){
  const b=document.getElementById('sync-btn');
  b.textContent=text; b.className='sync-btn '+(state||'');
  if(state==='ok') setTimeout(()=>{b.textContent='☁ Guardar en Sheet';b.className='sync-btn';},3000);
}

// ── SYNC: guardar vía Apps Script ──
async function syncAll(){
  setSyncBtn('syncing','⟳ Guardando…');
  try {
    const pRows = [['fecha','id','tienda','producto','nombre_pagina','foto_link','precio','precio_comp','montado','mes','notas']];
    PAGINAS.forEach(p=>pRows.push([p.fecha||'',p.id||'',p.tienda||'',p.producto||'',p.nombre_pagina||'',p.foto_link||'',p.precio||0,p.precio_comp||0,p.montado?'SI':'NO',p.mes||'',p.notas||'']));

    const vRows = [['fecha','producto','mes','material','descarga','voz','edicion','creativos','notas']];
    VIDEOS.forEach(v=>vRows.push([v.fecha||'',v.producto||'',v.mes||'',v.material?'SI':'NO',v.descarga?'SI':'NO',v.voz?'SI':'NO',v.edicion?'SI':'NO',v.creativos?'SI':'NO',v.notas||'']));

    // Guardar PAGINAS
    await postSheet('PAGINAS', pRows);
    // Guardar VIDEOS
    await postSheet('VIDEOS', vRows);

    setSyncBtn('ok','✓ Guardado');
    toast('✅ Datos guardados en Google Sheets');
  } catch(e){
    setSyncBtn('err','✗ Error');
    toast('❌ '+e.message,'err');
  }
}

async function postSheet(sheetName, rows){
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({sheet: sheetName, rows: rows})
  });
  const text = await res.text();
  let json;
  try { json = JSON.parse(text); } catch(e) { throw new Error('Respuesta inválida del servidor'); }
  if(!json.ok) throw new Error('Error en '+sheetName);
  return json;
}

// ── CARGAR desde Apps Script ──
async function loadFromSheet(){
  try {
    const res = await fetch(SCRIPT_URL + '?sheet=PAGINAS');
    const data = await res.json();
    const rows = data.rows || [];
    if(rows.length < 2) return;
    const headers = rows[0];
    const loaded = rows.slice(1).filter(r=>r[3]).map(r=>{
      const o={};
      headers.forEach((h,i)=>o[h]=r[i]||'');
      return {
        fecha:o.fecha, id:o.id, tienda:o.tienda, producto:o.producto,
        nombre_pagina:o.nombre_pagina, foto_link:o.foto_link,
        precio:parseInt(o.precio)||0, precio_comp:parseInt(o.precio_comp)||0,
        montado:o.montado==='SI', mes:o.mes, notas:o.notas, fotos:false
      };
    });
    if(loaded.length>0){
      PAGINAS=loaded;
      updateHeader(); renderPaginas();
      toast('📥 Datos cargados desde Google Sheets');
    }
  } catch(e){ /* usa datos iniciales */ }
}

function fmt(n){try{return '$ '+Number(n).toLocaleString('es-CO');}catch(e){return n;}}
function isDone(v){return SK.every(k=>v[k]);}

function updateHeader(){
  const mont=PAGINAS.filter(p=>p.montado).length;
  document.getElementById('hp-montado').textContent='● Montados: '+mont;
  document.getElementById('hp-pend').textContent='● Pendientes: '+(PAGINAS.length-mont);
  document.getElementById('hp-total').textContent='Total: '+PAGINAS.length+' pág';
}

function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-paginas').style.display=tab==='paginas'?'block':'none';
  document.getElementById('panel-videos').style.display=tab==='videos'?'block':'none';
  document.getElementById('tb-paginas').style.display=tab==='paginas'?'flex':'none';
  document.getElementById('tb-videos').style.display=tab==='videos'?'flex':'none';
  if(tab==='paginas') renderPaginas(); else renderVideos();
}

function setEstP(s,el){estP=s;document.querySelectorAll('#pg-p .pill').forEach(b=>b.className='pill');el.className='pill '+(s==='montado'?'ag':s==='pendiente'?'ap':'aa');renderPaginas();}
function setEstV(s,el){estV=s;document.querySelectorAll('#pg-v .pill').forEach(b=>b.className='pill');el.className='pill '+(s==='done'?'ag':s==='pend'?'ap':'aa');renderVideos();}

function toggleMontado(idx){PAGINAS[idx].montado=!PAGINAS[idx].montado;updateHeader();renderPaginas();}
function saveFotoLink(idx,val){PAGINAS[idx].foto_link=val.trim();renderPaginas();}

function renderPaginas(){
  const q=(document.getElementById('sp').value||'').toLowerCase();
  const mes=document.getElementById('fp-mes').value;
  const tienda=document.getElementById('fp-tienda').value;
  const tbody=document.getElementById('tb-p');
  tbody.innerHTML='';
  const data=PAGINAS.filter(p=>{
    const mq=!q||p.producto.toLowerCase().includes(q)||(p.id||'').toLowerCase().includes(q)||(p.nombre_pagina||'').toLowerCase().includes(q);
    return mq&&(!mes||p.mes===mes)&&(!tienda||p.tienda===tienda)&&(estP==='todos'||(estP==='montado'&&p.montado)||(estP==='pendiente'&&!p.montado));
  });
  if(!data.length){tbody.innerHTML='<tr><td colspan="9" class="empty">Sin resultados</td></tr>';return;}
  let lastMes=null;
  data.forEach(p=>{
    const idx=PAGINAS.indexOf(p);
    if(p.mes!==lastMes){const sep=tbody.insertRow();sep.className='sep';sep.innerHTML='<td colspan="9">'+(MI[p.mes]||p.mes)+' — '+p.mes+'</td>';lastMes=p.mes;}
    const tr=tbody.insertRow();
    // Estado toggle
    const tdSt=tr.insertCell();
    const btn=document.createElement('button');
    btn.className='toggle-btn '+(p.montado?'montado':'pendiente');
    btn.innerHTML='<span class="toggle-dot"></span>'+(p.montado?'● Montado':'● Pendiente');
    btn.onclick=()=>toggleMontado(idx);
    tdSt.appendChild(btn);
    // Fecha
    const tdF=tr.insertCell();tdF.style.cssText='white-space:nowrap;color:var(--gray-400);font-family:var(--font-mono);font-size:10px';tdF.textContent=p.fecha;
    // Producto
    tr.insertCell().innerHTML='<div class="prod-name">'+p.producto+'</div>';
    // ID
    const tdID=tr.insertCell();tdID.className='prod-id';tdID.textContent=p.id||'—';
    // Tienda
    tr.insertCell().innerHTML='<span class="store '+(p.tienda||'')+'">'+( p.tienda||'—')+'</span>';
    // Nombre página
    tr.insertCell().innerHTML='<div class="prod-pagename" style="max-width:210px">'+(p.nombre_pagina||'—')+'</div>';
    // Foto
    const tdFoto=tr.insertCell();
    if(p.foto_link){
      tdFoto.innerHTML='<a class="foto-link" href="'+p.foto_link+'" target="_blank">🔗 Ver foto</a>';
    } else {
      const wrap=document.createElement('div');wrap.className='foto-input-wrap';
      const inp=document.createElement('input');inp.className='foto-input';inp.placeholder='Pegar link…';inp.type='url';
      const sBtn=document.createElement('button');sBtn.className='foto-save-btn';sBtn.textContent='→';
      sBtn.onclick=()=>saveFotoLink(idx,inp.value);
      inp.onkeydown=e=>{if(e.key==='Enter')saveFotoLink(idx,inp.value);};
      wrap.appendChild(inp);wrap.appendChild(sBtn);tdFoto.appendChild(wrap);
    }
    // Precio
    tr.insertCell().innerHTML='<div class="price">'+(p.precio?fmt(p.precio):'—')+'</div>'+(p.precio_comp?'<div class="price-comp">'+fmt(p.precio_comp)+'</div>':'');
    // Notas
    const tdNt=tr.insertCell();if(p.notas)tdNt.innerHTML='<span class="nota-tag">'+p.notas+'</span>';
  });
}

function toggleVideo(idx){const allDone=SK.every(k=>VIDEOS[idx][k]);SK.forEach(k=>VIDEOS[idx][k]=!allDone);renderVideos();}

function renderVideos(){
  const q=(document.getElementById('sv').value||'').toLowerCase();
  const mes=document.getElementById('fv-mes').value;
  const tbody=document.getElementById('tb-v');tbody.innerHTML='';
  const data=VIDEOS.filter(v=>(!q||v.producto.toLowerCase().includes(q))&&(!mes||v.mes===mes)&&(estV==='todos'||(estV==='done'&&isDone(v))||(estV==='pend'&&!isDone(v))));
  if(!data.length){tbody.innerHTML='<tr><td colspan="9" class="empty">Sin resultados</td></tr>';return;}
  let lastMes=null;
  data.forEach(v=>{
    const idx=VIDEOS.indexOf(v);
    if(v.mes!==lastMes){const sep=tbody.insertRow();sep.className='sep';sep.innerHTML='<td colspan="9">'+(MI[v.mes]||v.mes)+' — '+v.mes+'</td>';lastMes=v.mes;}
    const done=isDone(v);
    const tr=tbody.insertRow();
    const tdSt=tr.insertCell();
    const btn=document.createElement('button');
    btn.className='toggle-btn '+(done?'montado':'pendiente');
    btn.innerHTML='<span class="toggle-dot"></span>'+(done?'● Completo':'● Pendiente');
    btn.onclick=()=>toggleVideo(idx);
    tdSt.appendChild(btn);
    const tdF=tr.insertCell();tdF.style.cssText='white-space:nowrap;color:var(--gray-400);font-family:var(--font-mono);font-size:10px';tdF.textContent=v.fecha;
    const tdP=tr.insertCell();tdP.className='prod-name';tdP.textContent=v.producto;
    SK.forEach(k=>{const td=tr.insertCell();td.style.textAlign='center';const chip=document.createElement('span');chip.className='chip '+(v[k]?'ok':'no');chip.textContent=v[k]?'✓':'—';td.appendChild(chip);});
    const tdNt=tr.insertCell();if(v.notas)tdNt.innerHTML='<span class="nota-tag">'+v.notas+'</span>';
  });
}

function openModal(type){
  modalType=type;
  if(type==='pagina'){
    document.getElementById('modal-title').textContent='📄 Agregar página de producto';
    document.getElementById('modal-body').innerHTML=
      fg('Producto (interno)','<input id="m-prod" placeholder="NOMBRE PRODUCTO">')+
      fg('ID Producto','<input id="m-id" placeholder="Ej: 1675670">')+
      fg('Nombre en página','<input id="m-nompag" placeholder="Nombre que verá el cliente">')+
      fg('Enlace foto del producto','<input id="m-flink" type="url" placeholder="https://drive.google.com/…">')+
      fg('Tienda','<select id="m-tienda"><option>JUPPITAG</option><option>BACHITAG</option><option>MORRISTAG</option><option>SAMBITAG</option></select>')+
      fg('Mes','<select id="m-mes">'+MESES.map(m=>'<option>'+m+'</option>').join('')+'</select>')+
      fg('Fecha','<input id="m-fecha" type="date">')+
      fg('Precio venta (COP)','<input id="m-precio" type="number" placeholder="79900">')+
      fg('Precio comparación (COP)','<input id="m-pcomp" type="number" placeholder="159800">')+
      fg('Estado inicial','<select id="m-montado"><option value="0">🟣 Pendiente</option><option value="1">🟢 Montado</option></select>')+
      fg('Notas','<input id="m-notas" placeholder="Ej: FALTA PIXEL, NATA…">');
  } else {
    document.getElementById('modal-title').textContent='🎬 Agregar producto (Video)';
    document.getElementById('modal-body').innerHTML=
      fg('Producto','<input id="m-prod" placeholder="NOMBRE PRODUCTO">')+
      fg('Mes','<select id="m-mes">'+MESES.map(m=>'<option>'+m+'</option>').join('')+'</select>')+
      fg('Fecha','<input id="m-fecha" type="date">')+
      fg('Etapas completadas','<div class="check-grid">'+SK.map((k,i)=>'<label class="check-item"><input type="checkbox" id="m-'+k+'"> '+SL[i]+'</label>').join('')+'</div>')+
      fg('Notas','<input id="m-notas" placeholder="Observaciones…">');
  }
  document.getElementById('modal-bg').classList.add('open');
}
function fg(label,input){return '<div class="form-group"><label>'+label+'</label>'+input+'</div>';}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');}
document.getElementById('modal-bg').addEventListener('click',function(e){if(e.target===this)closeModal();});

function saveItem(){
  const prod=(document.getElementById('m-prod').value||'').trim().toUpperCase();
  if(!prod){alert('Ingresa el nombre del producto');return;}
  const fechaEl=document.getElementById('m-fecha');
  let fecha='';
  if(fechaEl&&fechaEl.value){const d=new Date(fechaEl.value+'T12:00');fecha=d.toLocaleDateString('es-CO',{day:'2-digit',month:'2-digit',year:'numeric'});}
  const mes=(document.getElementById('m-mes')||{}).value||'MAYO';
  const notas=(document.getElementById('m-notas')||{}).value||'';
  if(modalType==='pagina'){
    PAGINAS.push({producto:prod,id:(document.getElementById('m-id')||{}).value||'',nombre_pagina:(document.getElementById('m-nompag')||{}).value||'',foto_link:(document.getElementById('m-flink')||{}).value||'',tienda:(document.getElementById('m-tienda')||{}).value||'BACHITAG',mes,fecha,precio:parseInt((document.getElementById('m-precio')||{}).value)||0,precio_comp:parseInt((document.getElementById('m-pcomp')||{}).value)||0,montado:(document.getElementById('m-montado')||{}).value==='1',fotos:false,notas});
    renderPaginas();
  } else {
    const item={producto:prod,mes,fecha,notas};
    SK.forEach(k=>{item[k]=(document.getElementById('m-'+k)||{}).checked||false;});
    VIDEOS.push(item);renderVideos();
  }
  updateHeader();closeModal();
  toast('Producto agregado — presiona ☁ Guardar para sincronizar');
}

updateHeader();
renderPaginas();
loadFromSheet();
</script>
